name: Deploy to Staging and Production Servers

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  stage-deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy to Staging Server
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.DEPLOY_SSH_PORT }} ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_SERVER_IP }} << 'EOF'
            cd /srv/docker/container/app/STAGE
            eval $(ssh-agent -s)
            ssh-add ../.ssh/id_git
            git pull origin main
            docker compose -f docker-compose.yml up --build -d
          EOF

  prod-deploy:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy to Production Server
        run: |
          ssh -o StrictHostKeyChecking=no -p ${{ secrets.DEPLOY_SSH_PORT }} ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_SERVER_IP }} << 'EOF'
            cd /srv/docker/container/app/PROD
            eval $(ssh-agent -s)
            ssh-add ../.ssh/id_git
            git pull origin ${{ github.ref }}
            docker compose -f docker-compose.yml up --build -d
          EOF
